<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Sistema de gestión de farmacia" />
    <meta name="author" content="Palacios Mateo - González Patti, Valentín" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../css/style.css" />
    <title>Login - Farmacia</title>
  </head>
  <body class="d-flex flex-column min-vh-100">
    <header>
      <nav class="navbar navbar-dark bg-success">
        <div class="container">
          <span class="navbar-brand">Farmacia - Login</span>
        </div>
      </nav>
    </header>
    <main class="flex-grow-1">
      <div class="container d-flex justify-content-center mt-5">
        <div class="card p-4 shadow">
          <h4 class="text-center mb-3">Iniciar Sesión</h4>
          <form id="formLogin">

              <input
              type="text"
              inputmode="numeric"
              pattern="[0-9]*"
              id="dni"
              class="form-control mb-3"
              placeholder="DNI"
              minlength="7"
              maxlength="8"
              required
              />
              <input
              type="password"
              id="contrasena"
              class="form-control mb-3"
              placeholder="Contraseña"
              minlength="5"
              maxlength="20"
              required
              />
              <button type="submit" class="btn btn-success w-100" id="boton">
                  Ingresar
                </button>
                <p id="mensaje" class="text-danger text-center mt-3"></p>
            </form>
        </div>
      </div>
    </main>
    <footer class="bg-success py-2">
      <p class="text-white text-center fw-bold mb-0">
        &copy; Diseñado por Mateo y Valentin
      </p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.18.1/dist/axios.min.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="../js/api.js"></script>
    <script src="../js/login.js"></script>
  </body>
</html>
