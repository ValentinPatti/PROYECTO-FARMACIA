<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-success">
    <div class="container">
        <span class="navbar-brand">Farmacia - Login</span>
    </div>
</nav>

<div class="container d-flex justify-content-center mt-5">

    <div class="card p-4 shadow" style="width: 400px;">

        <h4 class="text-center mb-3">Iniciar Sesión</h4>

        <input type="text" id="dni" class="form-control mb-3" placeholder="DNI">

        <input type="password" id="contrasena" class="form-control mb-3" placeholder="Contraseña">

        <button class="btn btn-success w-100" onclick="login()">
            Ingresar
        </button>

        <p id="mensaje" class="text-danger text-center mt-3"></p>

    </div>

</div>

<script src="js/login.js"></script>

</body>
</html>
